esphome:
  name: relay2

esp8266:
  board: d1_mini

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Enable logging
logger:

# Enable Home Assistant API
api:

ota:
  platform: esphome
  password: !secret ota_password

switch:
 - platform: gpio
   pin:
     number: D2
   name: "relay"
   inverted: true
