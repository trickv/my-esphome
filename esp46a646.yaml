esphome:
  name: esp46a646

esp8266:
  board: d1_mini

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Enable logging
logger:

# Enable Home Assistant API
api:

ota:
  platform: esphome
  password: !secret ota_password_old_arduinoota

sensor:
  - platform: wifi_signal
    name: "WiFi Signal Sensor"
    update_interval: 60s
text_sensor:
  - platform: wifi_info
    ip_address:
      name: ESP IP Address
    mac_address:
      name: ESP Mac Wifi Address

switch:
 - platform: gpio
   pin:
     number: D2
   name: "relay D2"
   inverted: true
 - platform: gpio
   pin:
     number: D3
   name: "relay D3"
   inverted: true
